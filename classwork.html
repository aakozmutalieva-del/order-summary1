<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

  
  <script src="https://cdn.tailwindcss.com"></script>

  <title>Order Summary</title>
</head>

<body class="bg-[#e0e8ff] font-['Red_Hat_Display'] min-h-screen flex items-center justify-center">

  
  <main class="bg-white rounded-2xl shadow-xl w-[360px] overflow-hidden">

    
    <img src="./images/illustration-hero.svg" class="w-full" />

    
    <div class="p-8 text-center">

      <h1 class="text-2xl font-black text-[#1f2f56]">
        Order Summary
      </h1>

      <p class="text-[#7280a7] mt-4 text-[15px] leading-relaxed">
        You can now listen to millions of songs, audiobooks,
        and podcasts on any device anywhere you like!
      </p>

      
      <div class="bg-[#f5f7ff] flex items-center justify-between p-4 rounded-xl mt-6">

        <div class="flex items-center gap-4">
          <img src="./images/icon-music.svg" class="w-10 h-10" />

          <div class="text-left">
            <p class="font-bold text-[#1f2f56] text-sm">Annual Plan</p>
            <p class="text-[#7280a7] text-sm">$59.99/year</p>
          </div>
        </div>

        <button class="text-[#3829e0] text-sm font-bold hover:opacity-70 underline">
          Change
        </button>

      </div>

      <button class="w-full mt-6 bg-[#3829e0] text-white py-3 rounded-xl font-bold shadow-lg hover:bg-[#1f2f56] transition">
        Proceed to Payment
      </button>

      <button class="mt-5 text-[#7280a7] font-bold text-sm hover:text-[#1f2f56]">
        Cancel Order
      </button>

    </div>
  </main>

</body>
</html>
